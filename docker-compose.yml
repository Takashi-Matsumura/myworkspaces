services:
  db:
    image: postgres:16
    container_name: myworkspaces-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: myworkspaces
      POSTGRES_PASSWORD: myworkspaces
      POSTGRES_DB: myworkspaces
    ports:
      - "5432:5432"
    volumes:
      - myworkspaces-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myworkspaces -d myworkspaces"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  myworkspaces-db:
    name: myworkspaces-db
