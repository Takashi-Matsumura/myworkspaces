services:
  db:
    image: postgres:16
    container_name: myworkspaces-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: myworkspaces
      POSTGRES_PASSWORD: myworkspaces
      POSTGRES_DB: myworkspaces
    ports:
      - "5432:5432"
    volumes:
      - myworkspaces-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myworkspaces -d myworkspaces"]
      interval: 5s
      timeout: 3s
      retries: 10

  # RAG 用の埋め込みサーバ (BGE-M3)。
  # RAG sidecar (docker/rag) は LLAMA_EMBED_URL=http://host.docker.internal:8081/v1
  # で参照しているため、ここでは host の :8081 にバインドするだけで OK。
  # Apple Silicon では Metal が docker 内で使えないため CPU-only。BGE-M3 (Q4) は
  # CPU で 1 query 数百 ms 程度なので embedding 用途では実用速度が出る。
  llama-embed:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: myworkspaces-llama-embed
    restart: unless-stopped
    command:
      - "-m"
      - "/models/bge-m3-Q4_K_M.gguf"
      - "--embeddings"
      - "--pooling"
      - "cls"
      - "-c"
      - "8192"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8081"
    ports:
      - "8081:8081"
    volumes:
      # 開発者ごとに `~/.local/share/llama-models/bge-m3-Q4_K_M.gguf` を置いておく前提。
      # モデル取得手順は memory:llama_embed_setup.md 参照。
      - "${HOME}/.local/share/llama-models:/models:ro"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/v1/models > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  myworkspaces-db:
    name: myworkspaces-db
